<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messaggio inviato – SAMAR</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; width: 100%; }
:root { --bg:#ffffff; --text:#111111; --muted:#555; }
[data-theme="dark"] { --bg:#111111; --text:#ffffff; --muted:#ccc; }
body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background .3s, color .3s;
}
nav {
  background: #0a5c2c;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.35);
}
.nav-left { display:flex; align-items:center; gap:10px; text-decoration:none; }
.nav-logo { width:46px; height:46px; border-radius:50%; object-fit:contain; background:white; padding:2px; }
.nav-brand { color:white; font-size:16px; font-weight:bold; display:none; }
#themeBtn {
  width:34px; height:34px; border-radius:50%;
  border:2px solid rgba(255,255,255,.6);
  background:rgba(255,255,255,.15); color:white;
  font-size:16px; cursor:pointer; display:flex;
  align-items:center; justify-content:center;
  transition:background .2s;
}
main {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding: 40px 24px; text-align:center;
}
.icon { font-size: 72px; margin-bottom: 20px; }
h1 { font-size: 26px; color: #0f7a3b; margin-bottom: 12px; }
p { font-size: 15px; color: var(--muted); line-height: 1.6; max-width: 380px; margin: 0 auto 28px; }
.back-btn {
  display: inline-block;
  padding: 14px 28px;
  background: #0f7a3b;
  color: white;
  font-size: 15px;
  font-weight: bold;
  text-decoration: none;
  border-radius: 8px;
  transition: background .2s;
}
.back-btn:hover { background: #0a5c2c; }
footer {
  background: #0a5c2c;
  color: rgba(255,255,255,.75);
  text-align: center;
  padding: 16px 20px;
  font-size: 13px;
}
@media (min-width:560px) { .nav-brand { display:block; } }
</style>
</head>
<body>

<nav>
  <a class="nav-left" href="index.html">
    <img src="logo.jpeg" class="nav-logo" alt="Logo Samar">
    <span class="nav-brand">SAMAR</span>
  </a>
  <button id="themeBtn" aria-label="Tema">🌙</button>
</nav>

<main>
  <div class="icon">✅</div>
  <h1>Messaggio inviato!</h1>
  <p>Grazie per averci contattato. Abbiamo ricevuto la tua richiesta e ti risponderemo al più presto.<br><br>Controlla la tua email per la conferma.</p>
  <a class="back-btn" href="index.html">← Torna alla Home</a>
</main>

<footer>&copy; 2026 SAMAR — Tutti i diritti riservati</footer>

<script>
const html = document.documentElement;
const btn  = document.getElementById('themeBtn');
function applyTheme(t) {
  html.setAttribute('data-theme', t);
  btn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', t);
}
applyTheme(localStorage.getItem('theme') || 'light');
btn.addEventListener('click', () => applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
</script>
</body>
</html>
